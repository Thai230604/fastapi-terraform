name: Deploy FastAPI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push image
      env:
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REPOSITORY_URL:$IMAGE_TAG -t $ECR_REPOSITORY_URL:latest .
        docker push $ECR_REPOSITORY_URL:$IMAGE_TAG
        docker push $ECR_REPOSITORY_URL:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}
        ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        envs: AWS_REGION,ECR_REPOSITORY_URL,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
        script: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y awscli
          fi
          aws ecr get-login-password --region $AWS_REGION | sudo docker login --username AWS --password-stdin $(echo $ECR_REPOSITORY_URL | cut -d/ -f1)
          sudo docker pull $ECR_REPOSITORY_URL:latest
          sudo docker stop fastapi || true
          sudo docker rm fastapi || true
          sudo docker run -d --restart unless-stopped -p 3000:8000 --name fastapi $ECR_REPOSITORY_URL:latest
